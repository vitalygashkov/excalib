name: Bug report
description: Report a reproducible defect in Excalib.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please include enough detail for maintainers to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and current behavior.
      placeholder: When I click sync, the extension...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact, ordered steps.
      placeholder: |
        1. Open excalidraw.com
        2. Open Excalib panel
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Excalib version
      description: For example 0.1.0
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 133
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste console output or attach screenshots if available.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I confirmed this issue using the latest release from GitHub.
          required: true
